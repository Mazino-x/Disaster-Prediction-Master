services:
  - type: web
    name: disaster-prediction-backend
    env: python
    repo: https://github.com/Mazino-x/Disaster-Prediction
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.api.main:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    plan: free
